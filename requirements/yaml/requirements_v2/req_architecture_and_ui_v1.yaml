requirements_document:
  doc_id: REQ-REQ-DOC-003
  title: AIDD上流工程品質保証プラットフォーム — アーキテクチャとUI設計 要件定義書
  version: '1.0'
  status: draft
  derived_from: PLN-PLN-ARCH-008
  functional_requirements:
  - req_id: REQ-FUNC-UIVITEST-001
    category: 検証
    priority: Should
    title: UI統一性自動検証機能（UI差分検出）
    description: 'systemは、工程スイッチ・タスクチケット・親子関係表現・オーバーレイの4種のUI要素について、

      UI差分検出と利用者操作を模した自動検証でデザインシステムとの整合性を自動検証する。

      工程スイッチ・タスクチケットはUI定義とUI差分検出、オーバーレイは自動検証で検証する。

      '
    rationale: UI統一性の検証を品質保証の対象とすることで、Codex自動生成時でも一貫したUIが維持されることを保証する。
    acceptance_criteria:
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: 工程スイッチのサイズ・配色・アイコン配置がデザインシステム定義と一致することをUI差分検出で確認できる'
      verification_method: テスト
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: タスクチケットのレイアウトとステータス表示がUI定義スナップショットと一致することを確認できる'
      verification_method: テスト
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: オーバーレイの表示タイミングと閉じ方が自動検証 利用者操作を模した自動検証でPASSする'
      verification_method: テスト
    assumptions:
    - UI定義とUI差分検出、自動検証が開発環境にセットアップ済みである
    risks:
    - risk_description: UI差分検出テストのスナップショット更新が煩雑でテスト維持コストが高くなる
      probability: 中
      impact: 中
      mitigation: スナップショット更新を半自動化するスクリプトを用意し、承認ワークフローを定義する
    derived_from: PLN-PLN-ARCH_UI_STANDARDIZATION_TARGETS-002
    traces_to:
    - REQ-REQ-DOC-003
    dependencies: []
    notes: ''
  - req_id: REQ-FUNC-RTWARN-001
    category: UI/UX
    priority: Must
    title: リアルタイム誤り検知・警告機能（6種エラーパターン）
    description: 'systemは、以下6種の誤りパターンをリアルタイムで検知し、ガイドを表示する。

      1. 曖昧語入力：テキスト入力時（入力中に）に検出し具体的代替表現を提示

      2. 必須項目未入力でDone遷移試行：Done遷移時に未完了チェックリスト項目をハイライト

      3. Abort理由50文字未満：Abort実行時にカウンターで残文字数を表示

      4. トレーサビリティ欠落：工程完了時に未紐付け要件リストを表示

      5. 同一ID重複：ID入力時に既存IDと一致した場合に警告表示

      6. JSON/YAML構文エラー：テンプレート編集時にエラー箇所と行番号をハイライト

      '
    rationale: 'エラーを早期に検知し具体的なガイドを提示することで、入力後のG1〜G5ゲート不合格による

      修正コストを削減する。

      '
    acceptance_criteria:
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: テキスト入力から入力中にに曖昧語アラートが表示される'
      verification_method: テスト
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: 6種のエラーパターン全てに対してガイドメッセージが表示される'
      verification_method: テスト
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: ID重複警告が表示されても入力操作が阻害されない（送信時にブロック）'
      verification_method: テスト
    assumptions:
    - 曖昧語リストはフロントエンドで入力検証 + 正規表現で実装される
    risks:
    - risk_description: リアルタイム検知の処理がUIの入力レスポンスを低下させる
      probability: 低
      impact: 中
      mitigation: デバウンス処理（入力中に）を実装し、自動テストでパフォーマンステストを実施する
    derived_from: PLN-PLN-ARCH_INTERACTION_WARNINGS-004
    traces_to:
    - REQ-REQ-DOC-003
    dependencies: []
    notes: ''
    gate_exempt:
    - G1
  - req_id: REQ-FUNC-PROGDISC-001
    category: UI/UX
    priority: Should
    title: 段階的情報開示機能（初心者/熟練者モード切替）
    description: 'userは、初心者モードと熟練者モードを切替えられるUIを提供する。

      初心者モード：ガイドツールチップ表示・サンプル記入例常時表示・各項目ヘルプアイコン・推奨アクション順の番号表示。

      熟練者モード：ガイド非表示・キーボードショートカット有効・一括操作機能解放。

      モード設定は利用端末内への設定保持に保存し、次回アクセス時に引き継ぐ。

      '
    rationale: JSON/YAMLスキルを持つユーザーの習熟度に応じたUXを提供し、初心者の学習コストと熟練者の操作コストを同時に低減する。
    acceptance_criteria:
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: モード切替ボタンで初心者/熟練者モードが即座に切替わる'
      verification_method: デモ
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: モード設定が利用端末内への設定保持に保存され、ブラウザ再起動後も維持される'
      verification_method: テスト
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: 熟練者モードで全機能がキーボードショートカットで操作できる'
      verification_method: デモ
    assumptions:
    - モード設定の管理に利用端末内への設定保持を使用する
    risks:
    - risk_description: 熟練者モードのショートカット定義がユーザー間で統一されず混乱を招く
      probability: 低
      impact: 低
      mitigation: ショートカット一覧をヘルプダイアログに常時表示し、カスタマイズは将来対応とする
    derived_from: PLN-PLN-ARCH_PROGRESSIVE_DISCLOSURE-005
    traces_to:
    - REQ-REQ-DOC-003
    dependencies: []
    notes: ''
  - req_id: REQ-FUNC-AUTOBACKUP-001
    category: データ管理
    priority: Must
    title: 自動バックアップ機能（毎日深夜2時実行）
    description: 'プロジェクトデータを毎日深夜2時にローカルディスクおよび外部ストレージへ自動バックアップする。

      バックアップは30日間保持する。バックアップ完了後にバックアップログを記録する。

      バックアップ失敗時はアプリケーションログにエラーを記録する。

      '
    rationale: ローカル永続化データ環境でのデータ保全を担保するために、定期バックアップを自動化する。
    acceptance_criteria:
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: 毎日深夜2時に永続化データのバックアップが自動実行される'
      verification_method: テスト
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: バックアップファイルが30日分保持され、31日目のファイルが自動削除される'
      verification_method: テスト
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: バックアップ実施履歴がログファイルに記録される'
      verification_method: テスト
    assumptions:
    - バックアップの自動実行はスケジュール実行手段で実装される
    risks:
    - risk_description: バックアップ失敗が検知されず長期間データが保護されない
      probability: 低
      impact: 高
      mitigation: バックアップ失敗時にアプリケーションログへエラー記録し、起動時に最終バックアップ日時を確認する
    derived_from: PLN-PLN-ARCH_BACKUP_POLICY-008
    traces_to:
    - REQ-REQ-DOC-003
    dependencies: []
    notes: ''
  non_functional_requirements:
  - req_id: REQ-NFUNC-TECHSTACK-001
    category: 保守性
    priority: Must
    title: 技術スタック準拠（フロントエンド/バックエンド）
    description: 'systemは、企画書の技術スタック定義（derived_from参照）に記載された主要スタックに準拠して実装する。

      主要スタックからの変更は設計変更として管理され、逸脱が検出可能であること。

      '
    rationale: 技術スタックを固定することで、1人開発体制での技術的負債を抑制し、保守性を維持する。
    metrics:
    - metric_name: 規定技術スタック準拠率
      target_value: 100%（主要レイヤーで規定外のフレームワークを使用しない）
      measurement_method: package.jsonのdependenciesを規定技術スタックリストと照合し、規定外パッケージがないことを確認する
      tool: 手動レビュー
    derived_from: PLN-PLN-ARCH_TECH_STACK-006
    traces_to:
    - REQ-REQ-DOC-003
    dependencies: []
    notes: ''
  - req_id: REQ-NFUNC-RTO-001
    category: 可用性
    priority: Must
    title: リカバリ時間目標（レベル別）
    description: 'systemは、障害レベル別のリカバリ時間目標（RTO）を以下の通り設定する。

      レベル1（永続化データ破損）：RTOは15分以内（バックアップからリストア→最新JSONエクスポートとマージ→トレーサビリティ再検証）。

      レベル2（CI/CD環境破壊）：RTOは30分以内（設定ファイル復元→シークレット再設定→テスト実行確認）。

      レベル3（完全なデータ損失）：RTOは2時間以内（テンプレートのGit復元→最終エクスポートからデータ復元）。

      '
    rationale: リカバリ手順と時間目標を事前に定義することで、障害発生時の対応品質を担保する。
    metrics:
    - metric_name: レベル1リカバリ所要時間
      target_value: ≤15分
      measurement_method: バックアップからのリストア手順をREADMEの通りに実施し、所要時間を計測する
      tool: 手動計測
    - metric_name: レベル2リカバリ所要時間
      target_value: ≤30分
      measurement_method: CI/CD設定ファイルの復元手順をREADMEの通りに実施し、所要時間を計測する
      tool: 手動計測
    derived_from: PLN-PLN-ARCH_RECOVERY_PROCEDURES-009
    traces_to:
    - REQ-REQ-DOC-003
    dependencies: []
    notes: ''
  constraints:
  - constraint_id: REQ-CONST-TECHFREEZE-001
    type: 技術的制約
    title: 規定技術スタック変更禁止（Phase 0期間中）
    description: 'Phase 0期間中は技術スタックの主要フレームワーク（React・Node.js・SQLite・GitHub Actions）を変更しない。

      マイナーパッケージの追加は許可するが、主要フレームワークの変更は変更管理プロセスに従う。

      '
    rationale: 1人開発体制で技術スタックを途中変更すると、設計・実装・テストのやり直しが発生し、Phase 0が完了しない。
    impact: 技術的負債や性能課題が発見されても、Phase 0期間中は規定スタック内で解決する。
    mitigation: 課題は設計ドキュメントに記録し、Phase 1以降の技術選定に反映する。
    derived_from: PLN-PLN-ARCH_TECH_STACK-006
