requirements_document:
  doc_id: REQ-REQ-DOC-006
  title: AIDD上流工程品質保証プラットフォーム — プロジェクト実行計画 要件定義書
  version: '1.0'
  status: draft
  derived_from: PLN-PLN-PLAN-013
  functional_requirements:
  - req_id: REQ-FUNC-PHASE0APP-001
    category: データ管理
    priority: Must
    title: Phase 0アプリケーション機能一式（7機能）の実装
    description: 'systemは、Phase 0として以下7機能を実装する。

      1. 3層ワークフロー表示（L1/L2/L3構造のタスク管理と表示）

      2. タスクステータス管理（ToDo/InProgress/Done/Abort）

      3. Abort理由記録（カテゴリ4種・50文字以上の理由必須）

      4. 判断ログ記録（必須6項目の入力と保存）

      5. トレーサビリティマトリクス（derived_from/traces_to/prompts_usedの管理）

      6. JSON/YAMLエクスポート（全データの構造化出力）

      7. 品質フロー図生成（フロントエンド Flow形式のQA活動フロー図）

      全機能が自動テスト単体テストと自動検証 利用者操作を模した自動検証で検証済みであること。

      '
    rationale: Phase 0の成果物としてアプリケーション機能を完成させることで、手法実証の前提環境を構築する。
    acceptance_criteria:
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: 上記7機能が各1件以上の自動検証 利用者操作を模した自動検証で動作確認されている'
      verification_method: テスト
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: データの保存・読込が正常に動作する'
      verification_method: テスト
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: JSON/YAMLエクスポートが実行でき、出力ファイルが開ける'
      verification_method: デモ
    assumptions:
    - 各機能の詳細仕様は専用要件定義書で定義される
    risks:
    - risk_description: 7機能全ての実装が1人開発体制では期間内に完了しない
      probability: 中
      impact: 高
      mitigation: 機能間の依存関係を分析してMust機能（1〜5）を優先実装し、Could機能（6〜7）は後続で実装する
    derived_from: PLN-PLN-PLAN_PHASE0_DELIVERABLES-001
    traces_to:
    - REQ-REQ-DOC-006
    dependencies: []
    notes: ''
  - req_id: REQ-FUNC-CICD-003
    category: 自動化
    priority: Must
    title: Phase 0 CI/CD環境構築（6コンポーネント）
    description: 'systemは、Phase 0としてCI/CDで以下6コンポーネントを含むCI/CD環境を構築する。

      1. CI/CD workflow（ci.yml）：テスト・Lint・品質ゲート自動実行

      2. AI評価統合：OpenAI API経由でのAI評価自動評価

      3. プロンプト評価統合：プロンプト品質の定量評価

      4. JSON Schemaスキーマ検証（スキーマ検証実装）：要件・設計YAMLの構造検証

      5. 品質レポート自動生成：テスト結果と品質メトリクスのレポート生成

      6. スコア推移記録：AI評価/プロンプト評価スコアの時系列記録

      全コンポーネントがPRマージ時に自動実行される。

      '
    rationale: CI/CD環境の構築により品質保証の自動化と証跡生成が実現し、手法実証の基盤となる。
    acceptance_criteria:
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: PRマージ時に6コンポーネント全てがCI/CDで自動実行される'
      verification_method: テスト
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: 全コンポーネントが合格した場合に品質レポートが自動生成される'
      verification_method: テスト
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: スコア推移が品質レポート上でグラフとして参照できる'
      verification_method: デモ
    assumptions:
    - CI/CDのPUBLIC REPOSITORYの無料枠を使用する
    risks:
    - risk_description: OpenAI APIキーの有効期限切れでAI評価/プロンプト評価統合が動作しなくなる
      probability: 低
      impact: 高
      mitigation: CI/CDのSecretsでAPIキーを管理し、有効期限前に更新するリマインダーを設定する
    derived_from: PLN-PLN-PLAN_PHASE0_DELIVERABLES-001
    traces_to:
    - REQ-REQ-DOC-006
    dependencies: []
    notes: ''
  - req_id: REQ-FUNC-PHASE0CTN-001
    category: 品質保証
    priority: Must
    title: Phase 0コンテンツ作成（テンプレート・チェックリスト・プロンプト集）
    description: 'Phase 0として以下のコンテンツを作成し、システムに格納する。

      1. 要件定義ワークフローテンプレート（YAML形式、1種類以上）

      2. 基本設計ワークフローテンプレート（YAML形式、1種類以上）

      3. 詳細設計ワークフローテンプレート（YAML形式、1種類以上）

      4. 曖昧語チェックリスト（1種類以上）

      5. 検証可能性チェックリスト（1種類以上）

      6. プロンプトテンプレート集（10種類以上）

      各コンテンツはAI評価スコア0.8以上またはプロンプト評価スコア0.8以上を達成している。

      '
    rationale: コンテンツが揃っていないと品質ゲートの実用的な運用ができないため、Phase 0で最低限のコンテンツを整備する。
    acceptance_criteria:
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: 上記6カテゴリのコンテンツが各1種類以上存在する'
      verification_method: レビュー
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: プロンプトテンプレート集が10種類以上存在する'
      verification_method: レビュー
    - criterion: 'Given: 対象機能が利用可能である / When: 記載された操作または条件が成立する / Then: 全テンプレートとプロンプトのAI評価/プロンプト評価スコアが0.8以上である'
      verification_method: テスト
    assumptions:
    - コンテンツは人手で作成し、AIによる自動生成は補助的に使用する
    risks:
    - risk_description: コンテンツ作成の工数がアプリ実装を圧迫する
      probability: 中
      impact: 中
      mitigation: アプリ実装を先行させ、コンテンツはPhase 0完了直前に集中して作成する計画を立てる
    derived_from: PLN-PLN-PLAN_PHASE0_DELIVERABLES-001
    traces_to:
    - REQ-REQ-DOC-006
    dependencies: []
    notes: ''
  - req_id: REQ-FUNC-PHASE0DOC-001
    category: 保守性
    priority: Must
    title: Phase 0ドキュメント整備（5種類）
    description: 'systemは、Phase 0として以下5種類のドキュメントを整備する。

      1. README（クイックスタート）：第三者が1時間以内にセットアップできる手順書

      2. アーキテクチャ設計書：システム構成とデータフローの説明

      3. 品質ゲート解説：G1〜G5の詳細説明と合格基準

      4. CI/CD設定ガイド：GitHub Actionsの設定方法と各ジョブの説明

      5. トラブルシューティング：よくある問題と解決方法

      全ドキュメントは日本語で記述する。

      '
    rationale: ドキュメントが整備されていないと第三者が手法を再現できず、実証としての価値が失われる。
    acceptance_criteria:
    - criterion: 上記5種類のドキュメントが全て存在する
      verification_method: レビュー
    - criterion: READMEに従い第三者が1時間以内にセットアップを完了できる
      verification_method: デモ
    assumptions:
    - ドキュメントはMarkdown形式でGitHubリポジトリに格納される
    risks:
    - risk_description: ドキュメントとシステムの仕様が乖離して第三者のセットアップが失敗する
      probability: 中
      impact: 中
      mitigation: ドキュメント更新をシステム変更の完了条件として定義し、変更なしでクローズできないルールを設ける
    derived_from: PLN-PLN-PLAN_PHASE0_DELIVERABLES-001
    traces_to:
    - REQ-REQ-DOC-006
    dependencies: []
    notes: ''
