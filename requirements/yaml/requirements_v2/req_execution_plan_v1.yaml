    category: 信頼性
    priority: Must
    title: Phase 0全画面動作確認（設計通りの動作）
    description: 'systemは、Phase 0で設計された全画面が自動検証 利用者操作を模した自動検証でPASSすること。

      テスト対象：タスク管理画面・ステータス遷移・Abort記録・判断ログ・トレーサビリティ・エクスポート・フロー図の各画面。

      '
    rationale: 全画面の動作を自動テストで確認することで、Phase 1パイロット開始前の品質を担保する。
    metrics:
    - metric_name: PlaywrightE2Eテスト通過率
      target_value: 100%（設計された全画面に対して）
      measurement_method: CI/CDで自動検証 利用者操作を模した自動検証スイートを実行し、全テストが通過することを確認する
      tool: 自動検証
    derived_from: PLN-PLN-PLAN_PHASE0_CRITERIA-002
    traces_to:
    - REQ-REQ-DOC-006
