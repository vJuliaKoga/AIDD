    category: 保守性
    priority: Must
    title: 第三者セットアップ所要時間（1時間以内）
    description: 'userは、本システムのGitHubリポジトリをクローンし、READMEの手順に従ってWindows 11環境で

      全機能をセットアップする作業が1時間以内に完了すること。

      JSON/YAML読み書きスキルを持つエンジニアが対象。

      '
    rationale: 再現可能性の担保として、第三者がセットアップできるドキュメントの品質を定量的に保証する。
    metrics:
    - metric_name: セットアップ所要時間
      target_value: ≤60分（クローンから全機能の起動確認まで）
      measurement_method: JSON/YAML読み書きスキルを持つエンジニア1名がREADMEのみを参照してセットアップを実施し、所要時間を計測する
      tool: 手動計測
