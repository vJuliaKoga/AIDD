        required: true
        default_value: ''
        description: 最終更新日時（ISO8601形式）
      relationships:
      - related_entity: AbortLog
        relationship_type: 1対多
        description: 1つのTaskに複数のAbortLogが存在する
      - related_entity: DecisionLog
        relationship_type: 1対多
        description: 1つのTaskに複数のDecisionLogが存在する
      - related_entity: QualityResult
        relationship_type: 1対多
        description: 1つのTaskに複数の品質評価結果が存在する（実行履歴）
      validation_rules:
      - rule: idはPREFIX-PHASE-PURPOSE-NNN形式に準拠すること
