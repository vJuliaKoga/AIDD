  quality_gates:
  - gate_id: REQ-QG-G1-001
    phase: 要件定義・設計・テスト（全工程）
    title: G1 曖昧語チェック
    conditions:
    - condition: 対象成果物のテキストフィールドに曖昧語（「適切に」「十分に」「できるだけ」「なるべく」「基本的に」「一般的に」「必要に応じて」「適宜」「柔軟に」「簡単に」「最適に」等）が0件であること
      automated: true
      tool: ambiguous_checker.py
    blocking: true
    pass_criteria: 曖昧語検出数 = 0件
    derived_from: PLN-PLN-QA-007
  - gate_id: REQ-QG-G2-001
    phase: 要件定義（機能要件・非機能要件）
    title: G2 検証可能性チェック
    conditions:
    - condition: 全機能要件にacceptance_criteriaが1件以上存在すること
      automated: true
      tool: validate_req.py
    - condition: 全非機能要件にmetricsが1件以上存在しtarget_valueに定量値が含まれること
      automated: true
      tool: validate_req.py
    blocking: true
    pass_criteria: 全機能要件のacceptance_criteria ≥ 1 かつ 全非機能要件のmetrics ≥ 1（target_valueに数値または比率を含む）
    derived_from: PLN-PLN-QA-007
  - gate_id: REQ-QG-G3-001
    phase: 要件定義・設計・テスト（全工程）
    title: G3 構造一貫性チェック（JSONスキーマ検証）
    conditions:
    - condition: 成果物YAMLがreq.schema.jsonのスキーマ検証を100%パスすること
      automated: true
      tool: validate_req.py
    blocking: true
    pass_criteria: validate_req.py実行結果の標準出力にVALIDが含まれること
    derived_from: PLN-PLN-QA-007
  - gate_id: REQ-QG-G4-001
    phase: 要件定義・設計（pull_requestマージ時）
    title: G4 AI評価スコア（Deep Eval）
    conditions:
    - condition: Deep EvalによるContextual Relevancy・Faithfulness・Contextual Precision・Answer
        Relevancyの加重平均スコアが0.8以上であること
      automated: true
      tool: run_gates.py（Deep Eval統合）
