    metrics:
    - metric_name: バックアップ実行成功率
      target_value: ≥99%（直近30日間）
      measurement_method: バックアップログの成功・失敗レコードから割合を算出
      tool: バックアップスクリプトログ
    - metric_name: バックアップ保持期間
      target_value: 30日
      measurement_method: バックアップディレクトリのファイル一覧で最古ファイルの日付を確認
      tool: ファイルシステム確認スクリプト
    derived_from: PLN-PLN-ARCH-008
    traces_to: []
    dependencies: []
  - req_id: REQ-NFUNC-STABLE-001
    category: 品質安定性
    priority: Should
    title: Deep Evalスコア安定性
    description: '同一のプロンプトセットに対するDeep Evalスコアの標準偏差が0.05未満であること。

      Promptfoo評価を週次で実行し、スコアが0.8を下回った場合にアラートを自動発出すること。

      '
    rationale: AIモデルのバージョン変動によるスコアの不安定性を検知し、プロンプト品質を維持するため
    metrics:
    - metric_name: Deep Evalスコア標準偏差
      target_value: σ < 0.05
      measurement_method: 同一プロンプトセットを10回実行しスコアの標準偏差をPythonスクリプトで算出
      tool: Deep Eval + Python
    - metric_name: Promptfooスコア
      target_value: ≥0.8
      measurement_method: Promptfoo評価を週次実行しスコアをAllure Reportに記録
      tool: Promptfoo
    derived_from: PLN-PLN-MEASURE-012
    traces_to: []
    dependencies: []
  - req_id: REQ-NFUNC-SEC-001
    category: セキュリティ
    priority: Must
    title: APIキーの環境変数管理
    description: 'OpenAI APIキーを含む機密情報をソースコード内に直接記述せず、

      環境変数（.envファイル）で管理すること。

      .envファイルは.gitignoreに登録しリポジトリにコミットしないこと。

      GitHub Actionsではシークレット（GitHub Secrets）を使用すること。

      '
    rationale: APIキー漏洩によるOpenAI料金の不正使用リスクを排除するため
    metrics:
    - metric_name: .envファイルのgit追跡件数
      target_value: 0件
      measurement_method: git ls-filesコマンドで.envが追跡対象でないことを確認
      tool: git
