  integration_requirements:
  - integration_id: REQ-INTEG-OPENAI-001
    title: OpenAI API連携（Deep Eval評価）
    target_system: OpenAI API
    interface_type: REST API
    data_format: JSON
    protocol: HTTPS
    frequency: pull_requestマージ時（自動）および手動実行時
    authentication: API Key（環境変数OPENAI_API_KEYから読み込む）
    error_handling: APIタイムアウト（60秒）またはエラー発生時はG4をスキップしWARNINGをログに記録する
    rationale: Deep EvalによるLLM出力の品質評価でG4ゲートを自動実行するため
    assumptions:
    - OpenAI APIキーは環境変数として設定済みであること
    risks:
    - risk_description: OpenAI API料金体系の変更により月額コストが10万円を超過する
      probability: 低
      impact: 高
      mitigation: 月次でAPIコスト推移を確認し超過の見込みがある場合は実行頻度を削減する
    derived_from: PLN-PLN-QA-007
  - integration_id: REQ-INTEG-CICD-001
    title: GitHub Actions CI/CD統合
    target_system: GitHub Actions
    interface_type: その他
    data_format: YAML
    protocol: HTTPS
    frequency: pushおよびpull_requestイベント時（自動）
    authentication: GitHub Token（GITHUB_TOKEN）
    error_handling: Workflow失敗時はマージをブロックし失敗ログをActionsタブに記録する
    rationale: 品質ゲートをCI/CDに統合し形骸化を防止するため
    assumptions:
