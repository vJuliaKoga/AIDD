    traces_to: []
    dependencies: []
  constraints:
  - constraint_id: REQ-CONST-AI-001
    type: 技術的制約
    title: AI基盤はOpenAI APIのみ使用可能
    description: '本システムで使用するAI評価機能（Deep Eval、Promptfoo）のバックエンドは

      OpenAI API（gpt-4o等）のみ使用可能とする。

      Anthropic・Google等の他プロバイダーへの変更は設計変更が必要。

      '
    rationale: 契約上の制約により使用可能なAI APIはOpenAIのみに限定されている
    impact: 他のLLMとの比較検証ができない。将来的なマルチモデル対応には設計変更が必要
    mitigation: OpenAI APIのモデルバージョンをピン留めし、バージョン変更の影響を最小化する
    derived_from: PLN-PLN-TERM-004
  - constraint_id: REQ-CONST-OS-001
    type: 技術的制約
    title: 動作確認環境はWindows 11 Homeのみ
    description: '本システムの動作確認環境はWindows 11 Home（PowerShell環境）のみとする。

      Linux/macOSでの動作は保証対象外とする。

      '
    rationale: 開発者の手元環境がWindows 11 Homeであり、他OS環境での検証リソースがない
    impact: Mac/Linux環境での動作が未検証。コンテナ化なしでは他OS対応不可
    mitigation: 将来のPhase 2でDocker対応を検討する
    derived_from: PLN-PLN-TERM-004
  - constraint_id: REQ-CONST-TEAM-001
    type: 組織ポリシー
    title: 開発体制は1人での実施
    description: '本プロジェクトの開発・検証は1人で実施する。

      外部レビュアーへの依頼は任意とするが、日常的な承認フローは設けない。

      '
    rationale: 個人プロジェクトとして予算・体制が1人分のみ確保されている
    impact: 開発速度の上限と品質レビューの深さに制限がある
    mitigation: 自動テスト（Vitest/Playwright）の充実により人的レビューを補完する
    derived_from: PLN-PLN-TERM-004
  - constraint_id: REQ-CONST-BROWSER-001
    type: 技術的制約
    title: 対応ブラウザはEdgeとChromeのみ
    description: '本システムの動作確認ブラウザはMicrosoft EdgeとGoogle Chromeのみとする。

      Firefox・Safari・モバイルブラウザは対象外とする。

      '
    rationale: Windows 11 Homeの標準環境で利用可能なブラウザに限定し、テスト範囲を最小化する
    impact: Firefox/Safariユーザーは本システムを利用できない
    mitigation: 将来の拡張時にPlaywrightのクロスブラウザテストを追加する
    derived_from: PLN-PLN-TERM-004
  - constraint_id: REQ-CONST-COST-001
    type: ビジネス制約
    title: 月額運用コストは10万円以内
    description: 'OpenAI API使用料・クラウドサービス費用を含む月額運用コストの合計を10万円以内とする。

      Deep Eval評価はpull_requestマージ時のみ実行してコストを制御する。

      '
    rationale: 個人プロジェクト規模の予算制約として月額10万円が上限と設定されている
    impact: 有料ツールやサービスの選択肢が限定される。大規模なAPI実行は予算超過リスクがある
    mitigation: OSSの最大活用、Deep EvalのAPIコール回数をpull_requestマージ時に限定する
    derived_from: PLN-PLN-TERM-004
  - constraint_id: REQ-CONST-SKILL-001
    type: 組織ポリシー
    title: ユーザーはJSON/YAML読み書きスキルを前提とする
    description: '本システムのユーザーはJSON/YAMLの構造を読み書きできるスキルを前提とする。

      GUIのみでの操作完結は目標とせず、テンプレートの内容理解と

      人による最終判断の実施を前提とする。

      '
    rationale: AIによる自動判断を行わない設計哲学に基づき、人間の判断の質を担保するために必要
    impact: JSON/YAML未経験者はシステムを利用できない。ユーザー層が限定される
    mitigation: UIによる補助（構文チェック表示・サンプル記入例の常時表示）を提供する
    derived_from: PLN-PLN-TERM-004
  - constraint_id: REQ-CONST-DB-001
    type: 技術的制約
    title: データ保存はローカルSQLiteのみ（Phase 0）
    description: 'プロジェクトデータの永続化はローカルのSQLiteデータベースのみとする。

      クラウドデータベースへの同期はPhase 0では対象外とする。

      同時接続ユーザー数は1人とする。

      '
    rationale: ローカル完結・ポータビリティを優先し、インターネット接続なしでの動作を保証するため
    impact: 複数ユーザーの同時利用は不可。クラウドバックアップはエクスポート機能で代替する
    mitigation: Phase 3以降でクラウドSQLiteオプションの追加を検討する
    derived_from: PLN-PLN-ARCH-008
