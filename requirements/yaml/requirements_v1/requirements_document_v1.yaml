      tool: Playwright
    derived_from: PLN-PLN-PLAN-013
    traces_to: []
    dependencies: []
  - req_id: REQ-NFUNC-MAINT-001
    category: 保守性
    priority: Must
    title: CI/CD経由の自動ビルド
    description: 'mainブランチへのpushにより、GitHub Actionsのワークフローが自動的に実行され、

      G1・G3・G5の品質ゲート検証をパスした場合にビルドが完了すること。

      ビルド完了後のデプロイは手動ステップなしでローカル環境に反映されること。

      '
    rationale: デプロイのオーバーヘッドを排除し、品質ゲートの形骸化を防ぐため
    metrics:
    - metric_name: CI/CDパイプライン成功率
      target_value: ≥90%（直近10回の実行）
      measurement_method: GitHub Actionsの実行履歴から成功・失敗件数を集計し割合を算出
      tool: GitHub Actions
    derived_from: PLN-PLN-VALID-011
    traces_to: []
    dependencies: []
  - req_id: REQ-NFUNC-BACKUP-001
    category: データ保全
    priority: Must
    title: SQLiteデータベース自動バックアップ
    description: 'SQLiteデータベースを毎日深夜2時にローカルディスクと外部ストレージの両方へ自動バックアップし、

      30日間保持すること。バックアップ完了後にバックアップログへタイムスタンプと

      対象ファイルサイズを記録する。バックアップ失敗時はログにエラー情報を記録する。

      '
