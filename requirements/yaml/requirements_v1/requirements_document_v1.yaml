  - integration_id: REQ-INTEG-ALLURE-001
    title: Allure Report統合（品質スコア可視化）
    target_system: Allure Report
    interface_type: File
    data_format: JSON
    protocol: その他
    frequency: テスト実行毎（自動）
    authentication: 認証不要（ローカルレポート生成）
    error_handling: レポート生成失敗時はエラーをログに出力し前回のレポートを保持する
    rationale: 品質スコア推移を可視化しDeep Eval安定性の経時変化を監視するため
    assumptions:
