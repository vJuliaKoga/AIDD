requirements_document:
  doc_id: REQ-REQ-DOC-001
  title: AIDD上流工程品質保証プラットフォーム Phase 0 要件定義書
  version: '1.0'
  status: draft
  derived_from: PLN-PLN-CONCEPT-005
  functional_requirements:
  - req_id: REQ-FUNC-QG-001
    category: 品質保証
    priority: Must
    title: 品質ゲート一括実行機能（G1〜G5）
    description: '指定した成果物（YAML/JSONファイル）に対してG1〜G5の5つの品質ゲートを順次実行し、

      各ゲートのPASS/FAIL判定と詳細エラー情報をJSON形式で返す機能。

      G1（曖昧語検出数=0件）、G2（受入基準1件以上）、G3（JSONスキーマ100%パス）、

      G4（Deep Evalスコア≥0.8）、G5（トレーサビリティカバレッジ100%）を評価する。

      いずれかのゲートがFAILの場合、次工程移行をブロックし修正ガイドを提示する。

      '
    rationale: 仕様書の妥当性を機械的に検証し、仕様と実装の乖離リスクを低減するため
    acceptance_criteria:
    - criterion: G1〜G5の全ゲートが実行され、各ゲートのPASS/FAILと詳細エラーがJSON形式で返却される
      verification_method: テスト
    - criterion: G4のDeep Evalスコアが0.8以上の場合にG4=PASSと判定される
      verification_method: テスト
    - criterion: いずれかのゲートがFAILの場合、次工程移行がブロックされ修正ガイドが表示される
      verification_method: テスト
    assumptions:
    - OpenAI APIキーが環境変数OPENAI_API_KEYとして設定済みであること
    - 対象ファイルがYAMLまたはJSON形式であること
    risks:
    - risk_description: OpenAI API障害時にG4ゲートが実行不可能となる
      probability: 低
      impact: 中
      mitigation: G4障害時はスキップ可能にしWARNINGをログに記録する
    derived_from: PLN-PLN-QA-007
    traces_to: []
    dependencies: []
    notes: PRD F-001に対応
  - req_id: REQ-FUNC-TASK-001
    category: タスク管理
    priority: Must
    title: 3層タスクチケット管理機能
    description: '工程（L1：REQ/BAS/DET）、タスク（L2：REQ-T001等）、詳細（L3：チェック観点/テンプレート/プロンプト）

      の3層構造でタスクチケットを管理する機能。

      各チケットはtitle、purpose、checkpoints、acceptance_criteriaを持ち、

      PREFIX-PHASE-PURPOSE-NNN形式のIDを持つ。

      UI上で工程選択→タスク展開→詳細表示のドリルダウン操作が可能であること。

      '
    rationale: QAワークフローを段階的に展開可能な構造とし、QA観点の漏れを防ぐため
    acceptance_criteria:
    - criterion: L1工程→L2タスク→L3詳細の順にドリルダウン表示できる
      verification_method: テスト
    - criterion: 各チケットのIDがPREFIX-PHASE-PURPOSE-NNN形式でない場合にバリデーションエラーが表示される
      verification_method: テスト
    - criterion: 工程切り替え後、当該工程のタスク一覧が画面に表示される
      verification_method: デモ
    assumptions:
    - 工程はREQ（要件定義）、BAS（基本設計）、DET（詳細設計）の3種類とする
    risks:
    - risk_description: 3層構造の深さにより、UIの操作フローが複雑化してユーザーが迷う
      probability: 中
      impact: 中
      mitigation: 3層固定とし、それ以上の階層を追加しない。パンくずリストで現在位置を表示する
    derived_from: PLN-PLN-SYS-006
    traces_to: []
    dependencies: []
    notes: PRD F-002に対応
  - req_id: REQ-FUNC-STATUS-001
    category: タスク管理
    priority: Must
    title: タスクステータス管理機能
    description: 'タスクチケットのステータスをToDo→InProgress→DoneまたはToDo→InProgress→Abort

      の遷移規則で管理する機能。

      Done遷移はチェックリスト全項目の完了を条件とし、

      Abort遷移はAbort理由の記録完了（カテゴリ選択＋50文字以上の理由）を条件とする。

      '
    rationale: QAプロセスの実施状況を追跡し、チェックリスト未完了のままDone化する形骸化を防止するため
    acceptance_criteria:
    - criterion: ToDo/InProgress/Done/Abortの4状態がUI上で表示・変更できる
      verification_method: テスト
    - criterion: チェックリスト未完了の状態でDone遷移を試みた場合、遷移がブロックされ未完了項目が強調表示される
      verification_method: テスト
    - criterion: Abort理由が50文字未満の場合、Abort遷移がブロックされ字数カウンターと入力ガイドが表示される
      verification_method: テスト
    assumptions: []
    risks:
    - risk_description: ステータス遷移のバリデーションをフロントエンドのみで実装した場合、APIを直接呼び出すことで回避される
      probability: 低
      impact: 高
      mitigation: バックエンドAPIでもステータス遷移条件を検証する
    derived_from: PLN-PLN-SYS-006
    traces_to: []
    dependencies: []
    notes: PRD F-003に対応
  - req_id: REQ-FUNC-ABORT-001
    category: 品質記録
    priority: Must
    title: Abort理由記録機能
    description: 'タスクをAbortする際に以下4項目の入力を必須とする機能。

      （1）reason_category：scopeout / prerequisite_missing / delegated / not_applicable
      の4種から選択

      （2）reason_detail：50文字以上の具体的な判断根拠

      （3）alternative_action：代替措置の内容

      （4）approved_by：判断を承認した責任者の氏名

      すべての必須項目が入力済みの場合にのみAbort遷移を許可する。

      '
    rationale: Abortを正式な品質判断として記録し、形骸化防止と将来の再検討を可能にするため
    acceptance_criteria:
    - criterion: 4つの必須フィールドが未入力の場合、保存がブロックされ未入力フィールドが強調表示される
      verification_method: テスト
    - criterion: reason_detailが50文字未満の場合、字数カウンターとエラーメッセージが表示される
      verification_method: テスト
    - criterion: 保存されたAbort記録がタスクIDで検索・取得可能であること
      verification_method: テスト
    assumptions:
    - 承認者はシステム外部のユーザーも含むため、氏名を手入力で記録する
    risks:
    - risk_description: reason_detailに形式的な文言（例：スコープ外のため）のみが50文字に水増しして入力される
      probability: 高
      impact: 中
      mitigation: CI/CDで最低50文字を自動検証する。内容の妥当性は週次レビューで確認する
    derived_from: PLN-PLN-QA-007
    traces_to: []
    dependencies: []
    notes: PRD F-004に対応
  - req_id: REQ-FUNC-DEC-001
    category: 品質記録
    priority: Must
    title: 判断ログ記録機能
    description: '設計上の判断を記録する際に以下4項目の入力を必須とする機能。

      （1）decided_by：判断者の氏名

      （2）decided_at：ISO8601形式の日時（例：2026-02-25T10:00:00+09:00）

      （3）decision_summary：50文字以上の判断内容の要約

      （4）rationale：判断根拠（代替案と選択理由を含む）

      オプション項目：evidence（参照ドキュメントID）、risks_mitigation（リスクと軽減策）

      重要度High指定時は判断理由200文字以上＋代替案2つ以上を必須とする。

      '
    rationale: 判断根拠を記録して保守時の意図不明を防ぎ、同じ議論の繰り返しを排除するため
    acceptance_criteria:
    - criterion: 必須4項目が未入力の場合、保存がブロックされる
      verification_method: テスト
    - criterion: decided_atがISO8601形式でない場合、バリデーションエラーが表示される
      verification_method: テスト
    - criterion: decision_summaryが50文字未満の場合、字数カウンターとエラーメッセージが表示される
      verification_method: テスト
    - criterion: 保存された判断ログがタスクIDで検索・取得可能であること
      verification_method: テスト
    assumptions:
    - 重要度はHigh/Medium/Lowの3段階とする
    risks:
    - risk_description: 判断ログの記述量基準が形骸化し、最低文字数のみの記録が増加する
      probability: 中
      impact: 中
      mitigation: CI/CDでdecision_summaryの50文字以上を自動チェックする
    derived_from: PLN-PLN-QA-007
    traces_to: []
    dependencies: []
    notes: PRD F-005に対応
  - req_id: REQ-FUNC-TRACE-001
    category: トレーサビリティ
    priority: Must
    title: トレーサビリティ管理機能
    description: '全成果物（要件・設計・テスト）にIDを付与し、derived_from（上流参照）とtraces_to（下流参照）

      の双方向リンクを管理する機能。

      企画→要件→設計→テストの全工程でID紐付けが追跡可能であること。

      参照先IDが存在しないbroken linkを検出し、UI上でアラートを表示する。

      '
    rationale: 変更影響分析を可能にし、要件と実装の乖離を自動検知するため
    acceptance_criteria:
    - criterion: derived_fromに存在しないIDを設定した場合、broken linkエラーが検出されUI上に表示される
      verification_method: テスト
    - criterion: 企画書IDから要件→設計→テストまでのトレースリンクがUIで一覧表示できる
      verification_method: デモ
    - criterion: トレーサビリティカバレッジが100%の場合にG5がPASSとなる
      verification_method: テスト
    assumptions:
    - IDはissue_id.pyで発行され、id_issued_log.yamlに記録済みであること
    risks:
    - risk_description: ID変更時にderived_from/traces_toのリンク切れが多数発生する
      probability: 中
      impact: 高
      mitigation: ID変更時にすべての参照をスキャンしてbroken linkを一覧表示する
    derived_from: PLN-PLN-SYS-006
    traces_to: []
    dependencies: []
    notes: PRD F-006に対応
  - req_id: REQ-FUNC-AMB-001
    category: UI/UX
    priority: Must
    title: 曖昧語リアルタイム検出機能
    description: 'ユーザーがテキストフィールドに入力した内容に対し、「適切に」「十分に」「できるだけ」

      「なるべく」「基本的に」「一般的に」「必要に応じて」「適宜」「柔軟に」「簡単に」「最適に」

      等の曖昧語を正規表現で検出し、入力から300ms以内に警告メッセージと具体的な代替表現例を表示する。

      '
    rationale: AIが誤解釈する曖昧語を入力時点で除去し、要件定義の品質を前倒しで向上させるため
    acceptance_criteria:
    - criterion: 対象曖昧語を含むテキストを入力後300ms以内に警告が表示される
      verification_method: テスト
    - criterion: 警告には検出された曖昧語名と具体的な代替表現例が含まれる
      verification_method: テスト
    - criterion: 曖昧語を含まないテキストでは警告が表示されない
      verification_method: テスト
    assumptions: []
    risks:
    - risk_description: 正規表現の誤検知により正常な日本語表現が曖昧語として検出される
      probability: 中
      impact: 低
      mitigation: ユーザーが警告を個別に無視できる選択肢を提供する
    derived_from: PLN-PLN-ARCH-008
    traces_to: []
    dependencies: []
    notes: PRD F-007に対応
  - req_id: REQ-FUNC-EXPORT-001
    category: データ管理
    priority: Must
    title: JSON/YAML/PDFエクスポート機能
    description: 'プロジェクトの成果物（タスクチケット、判断ログ、品質ゲート結果、トレーサビリティ情報）を

      JSON形式、YAML形式、PDF形式の3種類でエクスポートする機能。

      エクスポート対象は工程単位（REQ/BAS/DET）または全工程を選択可能とする。

      PDF形式にはG1〜G5品質ゲート合否サマリーと品質フロー図を含める。

      '
    rationale: 成果物を既存ドキュメント管理ツールと連携させ、レビュー・監査での利用を可能にするため
    acceptance_criteria:
    - criterion: JSON/YAML形式でエクスポートしたファイルを同じシステムにインポートして元データと一致することを確認できる
      verification_method: テスト
    - criterion: PDF形式でエクスポートしたファイルにG1〜G5品質ゲート合否サマリーが含まれる
      verification_method: デモ
    - criterion: 工程単位と全工程の選択がUI上で可能であること
      verification_method: テスト
    assumptions: []
    risks:
    - risk_description: PDF生成ライブラリがWindows 11 Home環境で動作しない
      probability: 低
      impact: 中
      mitigation: Windows対応のpuppeteer等を使用し、CI環境で事前検証する
    derived_from: PLN-PLN-VIS-009
    traces_to: []
    dependencies: []
    notes: PRD F-008に対応
  - req_id: REQ-FUNC-SNAP-001
    category: データ管理
    priority: Must
    title: スナップショット保存機能
    description: 'プロジェクトの品質状態（タスク進捗サマリー、Deep Evalスコア、曖昧語検出数、

      トレーサビリティカバレッジ）を任意の時点でスナップショットとして保存する機能。

      スナップショットIDはSNAP-YYYYMMDD-HHMMSS形式とし、

      作成者・プロジェクト名・ステータスサマリー・品質メトリクスを含める。

      保存後はJSON/YAML/PDFの3形式でエクスポート可能とする。

      '
    rationale: 品質改善サイクルの証跡として特定時点の状態を保存し、改善前後の比較を可能にするため
    acceptance_criteria:
    - criterion: スナップショット作成後にSNAP-YYYYMMDD-HHMMSS形式のIDが付与される
      verification_method: テスト
    - criterion: 保存されたスナップショットにDeep Evalスコア・曖昧語検出数・トレーサビリティカバレッジの数値が含まれる
      verification_method: テスト
    - criterion: スナップショットからJSON/YAML/PDFの3形式でエクスポートできる
      verification_method: テスト
    assumptions: []
    risks:
    - risk_description: スナップショットの蓄積によりストレージを圧迫する
      probability: 低
      impact: 低
      mitigation: 保存期間を30日とし、それ以前のスナップショットを自動削除する
    derived_from: PLN-PLN-VIS-009
    traces_to: []
    dependencies: []
    notes: PRD F-009に対応
  - req_id: REQ-FUNC-GRAPH-001
    category: 品質保証
    priority: Must
    title: 品質スコア推移グラフ表示機能
    description: 'Deep EvalスコアをAllure Reportに連携し、時系列で品質スコアの推移を可視化する機能。

      グラフはDeep Evalスコア（時系列）、曖昧語検出数（時系列）、

      スキーマ検証パス率（割合）、トレーサビリティカバレッジ（割合）の4指標を表示する。

      Deep Evalスコアが0.75を下回った場合にアラートをUI上に表示する。

      '
    rationale: AIモデル変動やプロンプト改善による品質変化を時系列で観測し、品質劣化を早期検知するため
    acceptance_criteria:
    - criterion: Deep Evalスコアが0.75を下回った場合に赤色警告アラートがUI上に表示される
      verification_method: テスト
    - criterion: Allure Report画面から品質スコア推移グラフが参照可能であること
      verification_method: デモ
    - criterion: グラフに4指標（Deep Evalスコア・曖昧語数・スキーマパス率・トレーサビリティ）が表示される
      verification_method: デモ
    assumptions:
    - Allure Reportが実行環境にセットアップ済みであること
    risks:
    - risk_description: Deep Eval評価のAPIコスト超過により月額予算10万円を超過する
      probability: 中
      impact: 中
      mitigation: Deep Eval評価はPRマージ時にのみ自動実行し、開発中は手動実行とする
    derived_from: PLN-PLN-QA-007
    traces_to: []
    dependencies: []
    notes: PRD F-010に対応
  - req_id: REQ-FUNC-CICD-001
    category: 品質保証
    priority: Must
    title: CI/CDパイプライン品質自動検証機能
    description: 'GitHub Actionsを使用してmainブランチへのpushおよびpull_requestをトリガーに

      以下の検証を自動実行する機能。

      （1）YAML/JSON構文チェック

      （2）JSONスキーマ検証（G3）

      （3）曖昧語チェック（G1）

      （4）トレーサビリティチェック（G5）

      （5）Deep Eval評価（G4、pull_requestイベントのみ）

      全検証がパスしない場合はマージをブロックし修正ガイドを提示する。

      overrideマージ（Branch protection rulesの無効化）は設定上許可しない。

      '
    rationale: 品質ゲートの形骸化を防ぎ、品質基準を満たさない成果物が本流に混入しないようにするため
    acceptance_criteria:
    - criterion: G1・G3・G5の検証がpushイベントで自動実行され、FAILの場合はCIが失敗する
      verification_method: テスト
    - criterion: G4（Deep Eval）がpull_requestイベントでのみ実行され、スコア0.8未満の場合はCIが失敗する
      verification_method: テスト
    - criterion: Allure Reportがテスト実行後に自動生成され、GitHub Pages等で参照可能である
      verification_method: デモ
    assumptions:
    - GitHubリポジトリのBranch protection rulesでstatus checksが必須設定されていること
    risks:
    - risk_description: CI/CDの実行時間が長くなり開発サイクルが遅延する
      probability: 中
      impact: 中
      mitigation: G4はpull_requestのみ実行し、G1/G3/G5はキャッシュを活用して実行時間を短縮する
    derived_from: PLN-PLN-VALID-011
    traces_to: []
    dependencies: []
    notes: PRD F-011（CI/CD統合）に対応
  non_functional_requirements:
  - req_id: REQ-NFUNC-UX-001
    category: 操作性
    priority: Must
    title: 目的情報への3クリック以内アクセス
    description: '工程選択→タスク展開→観点/テンプレート表示の基本導線において、

      目的の情報に3クリック以内でアクセスできること。

      '
    rationale: 品質保証活動の認知負荷を低減し、実施率の向上を図るため
    metrics:
    - metric_name: 目的情報へのクリック数（基本導線）
      target_value: ≤3クリック
      measurement_method: 工程選択→タスク展開→観点表示のE2Eテストでクリック数を計測
      tool: Playwright
    derived_from: PLN-PLN-CONCEPT-005
    traces_to: []
    dependencies: []
  - req_id: REQ-NFUNC-PERF-001
    category: 性能
    priority: Must
    title: APIレスポンスタイム
    description: 'バックエンドAPIの全エンドポイントが同時接続1ユーザーの条件下で

      リクエスト送信から応答受信まで3秒以内に完了すること。

      G4（Deep Eval）評価エンドポイントは例外とし、60秒以内とする。

      '
    rationale: ユーザーの待機時間を抑制しQAワークフローの中断を防ぐため
    metrics:
    - metric_name: APIレスポンスタイム（通常エンドポイント）
      target_value: ≤3秒（P95）
      measurement_method: Playwrightのネットワーク計測でP95を記録
      tool: Playwright
    - metric_name: APIレスポンスタイム（Deep Eval評価エンドポイント）
      target_value: ≤60秒（P95）
      measurement_method: Deep Eval実行のエンドツーエンド時間をGitHub Actionsログから計測
      tool: GitHub Actions ログ
    derived_from: PLN-PLN-PLAN-013
    traces_to: []
    dependencies: []
  - req_id: REQ-NFUNC-AVAIL-001
    category: 可用性
    priority: Must
    title: ローカル環境起動成功率
    description: 'フロントエンド（localhost:5173）とバックエンド（localhost:3001）が

      README記載のセットアップ手順を1回実行した後に正常起動すること。

      起動成功率は10回の連続起動試験で10回成功（100%）を達成すること。

      '
    rationale: 個人開発環境で常時稼働できることを保証し、開発・評価の中断を防ぐため
