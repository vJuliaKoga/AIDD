      attributes:
      - attribute_name: id
        data_type: string
        required: true
        default_value: ''
        description: 'PREFIX-PHASE-PURPOSE-NNN形式のID（例: REQ-T001）'
      - attribute_name: phase_id
        data_type: string
        required: true
        default_value: ''
        description: 所属工程ID（REQ/BAS/DET）
      - attribute_name: title
        data_type: string
        required: true
        default_value: ''
        description: タスクの名称
      - attribute_name: status
        data_type: string
        required: true
        default_value: ToDo
        description: タスクステータス（ToDo/InProgress/Done/Abort）
      - attribute_name: layer
        data_type: string
        required: true
        default_value: ''
        description: タスク層（L1/L2/L3）
      - attribute_name: created_at
        data_type: datetime
        required: true
        default_value: ''
        description: 作成日時（ISO8601形式）
      - attribute_name: updated_at
