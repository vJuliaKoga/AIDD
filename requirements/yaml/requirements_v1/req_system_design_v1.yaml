      - source_id: PLN-PLN-SYS_STATUS-008
        target_ids: [REQ-FUNC-STATUS-002]
      - source_id: PLN-PLN-SYS_ABORT_PHILOSOPHY-009
        target_ids: [REQ-FUNC-ABORTREC-001]
      - source_id: PLN-PLN-SYS_ABORT_CATEGORIES-010
        target_ids: [REQ-DATA-ABORT-002]
    requirement_to_design:
      - source_id: REQ-FUNC-3LAYERWF-001
        target_ids: []
      - source_id: REQ-FUNC-TRACEID-001
        target_ids: []
      - source_id: REQ-FUNC-STATUS-002
        target_ids: []
      - source_id: REQ-FUNC-ABORTREC-001
        target_ids: []
      - source_id: REQ-FUNC-DECLOG-001
        target_ids: []
    requirement_to_test:
      - source_id: REQ-FUNC-3LAYERWF-001
        target_ids: []
