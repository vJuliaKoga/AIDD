  items:
  - id: PLN-PLN-ARCH_UI_QA_PURPOSE-001
    type: statement
    title: UI設計における品質観点（統一性の検証）
    content: '本プロジェクトでは、UI統一性の検証も品質保証の対象とする。

      目的は、設計仕様に対する再現性の確認である。


      - JSON Schema定義に準拠した構造の要素が、同一のReactコンポーネントで実装されているか

      - Codexによる自動生成でも一貫したUIが生成されるか

      - 一貫したUI設計パターンにより保守性（認知負荷の低減）を担保できるか

      '
    tags: []
    related:
      derivedfrom: [PRD-DOC-AIDD-001]
      tracesto: []
  - id: PLN-PLN-ARCH_UI_STANDARDIZATION_TARGETS-002
    type: table
    title: UI統一対象（要素・観点・検証方法）
    content: '| UI要素 | 統一観点 | 検証方法 |

      | --- | --- | --- |

      | 工程スイッチ | サイズ、配色、アイコン配置 | Visual Regression Testing |

      | タスクチケット | レイアウト、ステータス表示 | Storybook + Chromatic |

      | 親子関係表現 | インデント、接続線、展開アニメーション | E2Eテスト |

      | オーバーレイ | 表示タイミング、閉じ方、背景処理 | インタラクションテスト |

      '
    tags: []
    related:
      derivedfrom: [PRD-DOC-AIDD-001]
      tracesto: []
  - id: PLN-PLN-ARCH_UI_PATTERNS-003
    type: definition
    title: UI設計パターン（例：PhaseCard/TaskCard/DetailPanel）
    content: "uidesignpatterns:\n\n  phaseswitch:\n    component: \"PhaseCard\"\n\
      \    props:\n      - phaseid: string\n      - title: string\n      - status:\
      \ \"active\" | \"completed\" | \"pending\"\n      - taskcount: number\n    \
      \  - completionrate: number\n    visual:\n      width: \"300px\"\n      height:\
      \ \"120px\"\n      borderradius: \"8px\"\n      elevation: \"2\"\n\n  taskticket:\n\
      \    component: \"TaskCard\"\n    props:\n      - taskid: string\n      - title:\
      \ string\n      - status: \"ToDo\" | \"InProgress\" | \"Done\" | \"Abort\"\n\
      \      - priority: \"high\" | \"medium\" | \"low\"\n    visual:\n      width:\
      \ \"280px\"\n      height: \"auto\"\n      borderleft: \"4px solid {statuscolor}\"\
      \n      padding: \"16px\"\n\n  detailoverlay:\n    component: \"DetailPanel\"\
      \n    props:\n      - contenttype: \"checklist\" | \"template\" | \"prompt\"\
      \ | \"reference\"\n      - data: object\n    visual:\n      position: \"fixed\"\
      \n      width: \"60vw\"\n      maxwidth: \"800px\"\n      animation: \"slide-in-right\
      \ 0.3s\"\n"
    tags: []
