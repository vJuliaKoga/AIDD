      derivedfrom: [PRD-DOC-AIDD-001]
      tracesto: []
  - id: PLN-PLN-ARCH_INTERACTION_WARNINGS-004
    type: table
    title: よくある誤りへの警告（検知タイミングと対処ガイド）
    gate_exempt:
    - G1
    content: '| 誤りパターン | 検知タイミング | 警告内容 | 対処ガイド |

      | --- | --- | --- | --- |

      | 曖昧語入力 | テキスト入力時（リアルタイム） | 「『適切に』は曖昧な表現です」 | 「3秒以内に」等の具体例を提示 |

      | 必須項目未入力でDone | Done遷移時 | 「チェックリスト未完了」 | 未完了項目をハイライト |

      | Abort理由不足 | Abort実行時 | 「理由が50文字未満です」 | 記述ガイドライン表示 |

      | トレーサビリティ欠落 | 工程完了時 | 「未紐付けの要件があります」 | 該当要件リスト表示 |

      | 同一IDの重複 | ID入力時 | 「このIDは既に使用されています」 | ID命名規則を再提示 |

      | JSON/YAML構文エラー | テンプレート編集時 | 「構文エラー: 行12」 | エラー箇所をハイライト |

      '
    tags: []
    related:
      derivedfrom: [PRD-DOC-AIDD-001]
      tracesto: []
  - id: PLN-PLN-ARCH_PROGRESSIVE_DISCLOSURE-005
    type: statement
    title: 段階的情報開示（Progressive Disclosure）
    content: '初心者モード：

      - ガイドツールチップ表示

      - サンプル記入例を常時表示

      - 各項目にヘルプアイコン

      - 推奨アクション順を番号表示


      熟練者モード：

      - ガイド非表示

      - キーボードショートカット有効

      - 一括操作機能解放

      - カスタムビュー作成可能

      '
    tags: []
    related:
      derivedfrom: [PRD-DOC-AIDD-001]
      tracesto: []
  - id: PLN-PLN-ARCH_TECH_STACK-006
    type: table
    title: 技術スタック（レイヤー別）
    content: '| レイヤー | 技術選定 | 選定理由 |

      | --- | --- | --- |

      | フロントエンド | React + TypeScript | コンポーネント再利用性、型安全性 |

      | 状態管理 | Zustand | 軽量、学習コスト低 |

      | UI Framework | Tailwind CSS + shadcn/ui | 統一性、カスタマイズ性 |

      | データ検証 | Zod | ランタイム型検証、スキーマベース |

      | ビジュアライゼーション | React Flow | ワークフロー図生成 |

      | バックエンド | Node.js + Express | JSON/YAML処理の容易さ |

      | データベース | SQLite | ローカル完結、ポータビリティ |

      | CI/CD | GitHub Actions | 無料、YAML設定 |

      | テスト | Vitest + Playwright | 高速、モダン |

      | レポート | Allure Report | 視覚的、多機能 |

      | プロンプト評価 | Promptfoo | プロンプト専用評価 |

      | AI評価 | Deep Eval | LLM出力品質評価 |

      '
    tags: []
    related:
      derivedfrom: [PRD-DOC-AIDD-001]
      tracesto: []
  - id: PLN-PLN-ARCH_DATAFLOW-007
    type: list
    title: データフロー（処理の流れ）
    content: '1. ユーザー入力

      2. フロントエンド検証（リアルタイム曖昧語チェック、構文チェック）

      3. バックエンドAPI

      4. 品質ゲート実行（Deep Eval評価、JSON Schema検証、トレーサビリティチェック）

      5. 合格：データベース保存 → Allure Report更新

      6. 不合格：エラーフィードバック → ユーザーへ返却

      '
    tags: []
    related:
      derivedfrom: [PRD-DOC-AIDD-001]
      tracesto: []
  - id: PLN-PLN-ARCH_BACKUP_POLICY-008
    type: table
    title: バックアップ・リカバリ方針（データ保護戦略）
    content: '| データ種別 | バックアップ頻度 | 保存先 | 保持期間 |

      | --- | --- | --- | --- |

      | プロジェクトデータ | 毎日深夜2時 | ローカルディスク + 外部ストレージ | 30日 |

      | 判断ログ | リアルタイム | データベース + JSON Export | 無期限 |

      | テンプレート | バージョン管理 | Git Repository | 無期限 |

      | 評価結果 | テスト実行毎 | Allure Report履歴 | 90日 |

      '
    tags: []
    related:
      derivedfrom: [PRD-DOC-AIDD-001]
      tracesto: []
  - id: PLN-PLN-ARCH_RECOVERY_PROCEDURES-009
    type: decision_rule
    title: リカバリ手順（想定レベル別）
    content: 'レベル1：データベース破損

      - 検知：起動時整合性チェック失敗

      - 手順：前日バックアップからリストア → 最新JSONエクスポートとマージ → トレーサビリティ再検証

      - 見積時間：15分


      レベル2：CI/CD環境破壊

      - 検知：GitHub Actions実行失敗

      - 手順：設定ファイル(.github/workflows)復元 → シークレット再設定 → テスト実行で動作確認

      - 見積時間：30分


      レベル3：完全なデータ損失

      - 検知：すべてのバックアップ失敗

      - 手順：テンプレートはGitから復元 → プロジェクトデータは最終エクスポートから復元 → 判断ログ一部損失は許容

      - 見積時間：2時間

      '
    tags: []
    related:
      derivedfrom: [PRD-DOC-AIDD-001]
      tracesto: []
