      \  testphase:\n    existing: \"テスト設計 → 実施 → バグ報告\"\n    new: \"【トレーサビリティ確認】\
      \ → テスト設計 → 実施 → バグ報告\"\n    change: \"テスト漏れの事前検知\"\n"
