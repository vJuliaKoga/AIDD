  items:
  - id: PLN-PLN-ROLL_BLOCKER-001
    type: statement
    title: 現場導入の戦略（最大ブロッカーへの集中）
    content: '現場での最大の課題は「仕様書と実UIの乖離」である。

      この課題に対し、最も効果を実感しやすいポイント（仕様書妥当性評価）から導入を開始する。

      '
    tags: []
    related:
      derivedfrom: [PRD-DOC-AIDD-001]
      tracesto: []
  - id: PLN-PLN-ROLL_PHASES-002
    type: table
    title: 導入ステップ（Phase 0〜4）
    content: '| Phase | 対象 | 目的 | 成功指標 |

      | --- | --- | --- | --- |

      | Phase 0 | サンプルプロジェクト完成 | 手法の実証 | アプリ完成 + CI/CD構築 |

      | Phase 1 | 仕様書妥当性評価のみ | 即効性の実感 | 仕様書起因のバグ30%削減 |

      | Phase 2 | 要件定義工程追加 | 上流への拡大 | 手戻り工数20%削減 |

      | Phase 3 | 基本設計・詳細設計追加 | 全工程カバー | トレーサビリティ100%達成 |

      | Phase 4 | プロンプト共有機能追加 | ナレッジ蓄積 | プロンプトDB 100件以上 |

      '
    tags: []
    related:
      derivedfrom: [PRD-DOC-AIDD-001]
      tracesto: []
  - id: PLN-PLN-ROLL_PHASE1_RATIONALE-003
    type: decision_rule
    title: Phase 1を仕様書から始める理由（意思決定ロジック）
    content: 'Phase 1を仕様書妥当性評価から始める理由：

      - 現場が最も苦労しているポイントである

      - 効果が1週間以内に可視化される（即効性）

      - 既存ワークフローのフローチャート上で、追加ノードが3個以内である

      - テストエンジニアの専門領域に近い

      '
    tags: []
    related:
      derivedfrom: [PRD-DOC-AIDD-001]
      tracesto: []
  - id: PLN-PLN-ROLL_PHASE1_METRICS-004
    type: metric
    title: Phase 1の定量基準（効果可視化と追加ノード数）
    content: '- 効果可視化までの期間：1週間以内

      - 既存ワークフロー変更量：追加ノード（判断ノード + タスクノード）の合計が3個以内

      '
    tags: []
    related:
      derivedfrom: [PRD-DOC-AIDD-001]
      tracesto: []
  - id: PLN-PLN-ROLL_PHASE1_SCOPE-005
    type: list
    title: 'Phase 1: 仕様書妥当性評価の実施内容（対象とチェック）'
    content: '対象ドキュメント：

      - 画面仕様書

      - API仕様書

      - データモデル仕様書


      実施チェック（例）：

      - 仕様書曖昧語チェック（実装者の誤解を防ぐ）

      - 受入基準の検証可能性（テスト設計の前倒し）

      - UI統一性チェック（デザインシステムとの整合）


      パイロット計画：

      - 小規模な新機能開発（1〜2週間規模）

      - 専任QAエンジニア1名をアサイン

      - 週次で効果測定

      '
    tags: []
    related:
      derivedfrom: [PRD-DOC-AIDD-001]
      tracesto: []
  - id: PLN-PLN-ROLL_NODE_COUNT_RULE-006
    type: decision_rule
    title: 『既存ワークフロー変更ノード数』の定義と検証方法
    content: "- 「追加ノードが3個以内」は、既存ワークフローのBPMN図（または同等のフローチャート）を基準に、\n  追加される判断ノードとタスクノードの合計数をカウントする。\n\
      - 検証は、改修前後のBPMN図差分でノード増分を数え、3以下であることを確認する。\n"
    tags: []
    related:
      derivedfrom: [PRD-DOC-AIDD-001]
      tracesto: []
  - id: PLN-PLN-ROLL_PROCESS_INTEGRATION-007
    type: definition
    title: 既存プロセスとの整合性（組み込み差分）
    content: "processintegration:\n\n  requirementphase:\n    existing: \"要件定義書作成\
