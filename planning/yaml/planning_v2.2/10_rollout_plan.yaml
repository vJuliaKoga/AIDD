  - id: PLN-PLN-ROLL_ONBOARDING-009
    type: list
    title: 教育・オンボーディング（学習リソース）
    content: '- CI/CD環境の提示：GitHub Public Repositoryに、品質ゲート設定/Deep Eval/Promptfoo/Allure等を含めて提示

      - チュートリアル：シンプルなTodoアプリを題材に、要件YAML化→曖昧語チェック→トレーサビリティ→ゲート通過を体験（2時間）

      - ドキュメント：クイックスタート、品質ゲート解説、トラブルシューティング、ベストプラクティス集

      '
