  - id: PLN-PLN-ROLL_TOOL_INTEGRATION-008
    type: table
    title: 既存ツール連携ロードマップ（Phase 2以降想定）
    content: '| 期間 | ツール | 連携方法 | 便益 |

      | --- | --- | --- | --- |

      | 短期（Phase 2） | Markdown/Word | エクスポート機能 | 既存ドキュメント形式での共有 |

      | 中期（Phase 3） | Git | 自動コミット・タグ付け | バージョン管理との統合 |

      | 中期（Phase 3） | Slack | 品質アラート通知 | リアルタイム状況共有 |

      | 長期（Phase 4） | Jira | タスク自動生成 | プロジェクト管理統合 |

      | 長期（Phase 4） | Confluence | ドキュメント自動反映 | 一元的な情報管理 |

