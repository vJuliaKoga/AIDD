  - id: PLN-PLN-TERM_SCOPE_OUT-006
    type: table
    title: スコープ外（将来拡張候補）
    content: '| 項目 | 理由 | 将来優先度 |

      | --- | --- | --- |

      | アプリ内AI自動生成機能 | 人の判断重視の思想 | 低 |

      | 外部ツールAPI連携 | サンプルプロジェクトの範囲超過 | 中 |

      | ユーザー満足度測定 | 社内展開前段階 | 低 |

