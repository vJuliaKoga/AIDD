  - id: PLN-PLN-TERM_SCOPE_IN-005
    type: list
    title: スコープ内（本プロジェクトの対象）
    content: '- 上流工程（要件定義・基本設計・詳細設計）の品質保証ワークフロー

      - 構造化テンプレート・チェックリスト・プロンプト集の提供

      - 品質ゲート評価の自動化（Deep Eval、JSON Schema検証）

      - トレーサビリティID体系の実装

      - CI/CD環境構築とAllure Reportによるモニタリング

      - Promptfooによるプロンプト品質評価

      - Abort理由記録と判断ログの保存

      - JSON/YAMLエクスポート機能

      - データベースによる承認者管理

      '
